CONFIG_INPUT=y
CONFIG_ZMK_EXT_POWER=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_POINTING=y

#DYA-STUDIO
CONFIG_ZMK_BLE_MANAGEMENT=y
CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=y

CONFIG_ZMK_BATTERY_HISTORY=n
CONFIG_ZMK_BATTERY_HISTORY_INTERVAL_MINUTES=30
CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=n

CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SETTINGS_RPC_STUDIO=y

CONFIG_ZMK_SPLIT_RELAY_EVENT=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=1024

CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000
# Enable ZMK Studio
CONFIG_ZMK_STUDIO=y


# Enable settings storage (if not already enabled)
CONFIG_SETTINGS=y
